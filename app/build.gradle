plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    // Use JUnit test framework.
    testImplementation "org.junit.jupiter:junit-jupiter:5.11.4"
    implementation libs.guava
}
run{
    standardInput = System.in
}
test {
    useJUnitPlatform()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}
jar {
    manifest {
        attributes 'Main-Class': 'org.core.App'
    }
}
application {
    mainClass = 'org.core.App'
}
